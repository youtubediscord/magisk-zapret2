# Zapret2 runtime configuration
# runtime.ini is the authoritative live source for [core] runtime values.
# config.sh and /data/local/tmp/zapret2-user.conf are bootstrap inputs only.
# categories.ini remains the active category-state source.

[core]
schema_version=1
config_format=runtime-v1
runtime_source=repository-defaults
autostart=1
wifi_only=0
debug=0
qnum=200
desync_mark=0x40000000
ports_tcp=80,443
ports_udp=443
pkt_out=20
pkt_in=10
strategy_preset=syndata_multisplit_tls_google_700
preset_mode=categories
preset_file=Default.txt
custom_cmdline_file=cmdline.txt
nfqws_uid=0:0
log_mode=none
bootstrap_config_path=./config.sh
bootstrap_user_config_path=/data/local/tmp/zapret2-user.conf
categories_state_path=./categories.ini
