# Zapret2 runtime configuration
# Phase 1 canonical target for merged runtime state.
# Current runtime still falls back to legacy shell sources when needed.

[core]
schema_version=1
config_format=runtime-v1
runtime_source=repository-defaults
autostart=1
wifi_only=0
debug=0
qnum=200
desync_mark=0x40000000
ports_tcp=80,443
ports_udp=443
pkt_out=20
pkt_in=10
strategy_preset=syndata_multisplit_tls_google_700
preset_mode=categories
preset_file=Default.txt
custom_cmdline_file=cmdline.txt
nfqws_uid=0:0
log_mode=none

# Category sections reuse the legacy categories.ini schema for phase 1.
# Supported keys: protocol, hostlist, ipset, hostlist-domains, filter_mode, strategy.

[googlevideo_tcp]
protocol=tcp
hostlist=
ipset=
hostlist-domains=googlevideo.com
filter_mode=hostlist-domains
strategy=hostfakesplit_multi_google_tcp_ts

[youtube]
protocol=tcp
hostlist=youtube.txt
ipset=ipset-youtube.txt
filter_mode=ipset
strategy=hostfakesplit_multi_google_tcp_ts

[youtube_udp]
protocol=udp
hostlist=youtube.txt
ipset=ipset-youtube.txt
filter_mode=ipset
strategy=fake_6_google_quic

[discord_tcp]
protocol=tcp
hostlist=discord.txt
ipset=ipset-discord.txt
filter_mode=ipset
strategy=hostfakesplit_multi_google_tcp_ts

[discord_udp]
protocol=udp
hostlist=discord.txt
ipset=ipset-discord.txt
filter_mode=ipset
strategy=disabled

[voice_stun]
protocol=stun
hostlist=
ipset=
filter_mode=none
strategy=fake_veryfast_stun_discord
