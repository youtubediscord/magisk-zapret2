# Zapret2 preset runtime. The active TXT is the only traffic/strategy source.

[core]
schema_version=1
config_format=runtime-v1
runtime_source=repository-defaults
autostart=1
wifi_only=0
debug=0
qnum=200
desync_mark=0x40000000
pkt_out=20
pkt_in=10
active_preset=Default v1 (game filter).txt
nfqws_uid=0:0
log_mode=none
