protocol=udp
hostlist=
ipset=ipset-whatsapp.txt
filter_mode=ipset
strategy=fake_6_google_quic

# Voice calls: STUN/TURN (UDP 3478)
[whatsapp_voice]
protocol=stun
hostlist=
ipset=ipset-whatsapp.txt
filter_mode=ipset
