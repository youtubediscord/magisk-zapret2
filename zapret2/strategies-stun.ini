# ===============================
# STUN Strategies for nfqws2
# ===============================
# Each section [strategy_name] contains:
# - desc: Description of strategy
# - args: STUN desync arguments (--payload, --out-range, --lua-desync)
#
# NOTE: --filter-l7=stun,discord is added automatically by command-builder.
# Strategies only need: --payload, --out-range, --lua-desync
#
# Payload types:
# - stun,discord_ip_discovery: STUN + Discord IP discovery
#
# Out-range options:
# - -nN: Apply to first N packets per connection

[default]
desc=Default STUN bypass strategy
args=--payload=stun,discord_ip_discovery --out-range=-n8 --lua-desync=fake:blob=fake_default_udp

[disabled]
desc=STUN bypass disabled
args=

# ==================== VERY FAST STUN ====================

[fake_veryfast_stun_discord]
desc=Very fast STUN fake for Discord voice
args=--payload=stun,discord_ip_discovery --out-range=-n8 --lua-desync=fake:blob=fake_default_udp

# ==================== 6 REPEATS STRATEGIES ====================

[fake_x6_stun_discord_0x00]
desc=STUN fake x6 with 0x00 blob
args=--payload=stun,discord_ip_discovery --out-range=-n10 --lua-desync=fake:blob=0x00:repeats=6

[fake_x6_stun_discord]
desc=STUN fake x6 with stun blob
args=--payload=stun,discord_ip_discovery --out-range=-n10 --lua-desync=fake:blob=stun:repeats=6

[fake_x6_30_out_stun_discord]
desc=STUN fake x6 (first 30 packets)
args=--payload=stun,discord_ip_discovery --out-range=-n30 --lua-desync=fake:blob=0x00:repeats=6

[fake_x6_2plus_stun_discord]
desc=STUN fake x6 (2nd packet onwards)
args=--payload=stun,discord_ip_discovery --out-range=2+ --lua-desync=fake:blob=0x00:repeats=6

[fake_x6_pad_stun_discord]
desc=STUN fake x6 with padding
args=--payload=stun,discord_ip_discovery --out-range=-n10 --lua-desync=fake:blob=stun:repeats=6+udplen:delta=2

[fake_x6_default_udp]
desc=STUN fake x6 with fake_default_udp blob
args=--payload=stun,discord_ip_discovery --out-range=-n10 --lua-desync=fake:blob=fake_default_udp:repeats=6

[fake_x6_50_out_stun_discord]
desc=STUN fake x6 (first 50 packets)
args=--payload=stun,discord_ip_discovery --out-range=-n50 --lua-desync=fake:blob=fake_default_udp:repeats=6

[fake_x6_100_out_stun_discord]
desc=STUN fake x6 (first 100 packets)
args=--payload=stun,discord_ip_discovery --out-range=-n100 --lua-desync=fake:blob=fake_default_udp:repeats=6

